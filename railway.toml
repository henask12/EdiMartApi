# Railway deploy config for EdiMartApi
# Required variables (set in Railway UI — see README.md):
#   DATABASE_URL  — reference from Postgres service
#   JWT_SECRET    — long random string (you create this)

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npx prisma migrate deploy && node dist/main.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
